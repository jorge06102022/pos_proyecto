<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro — Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d2e;
            --border: #252840;
            --accent: #6c63ff;
            --accent-glow: rgba(108,99,255,0.2);
            --text: #e8eaf0;
            --muted: #5a5f78;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 60px; height: 60px;
            background: var(--accent);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 14px;
            box-shadow: 0 0 40px var(--accent-glow);
        }
        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }
        .card-login {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
        }
        .card-login h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #8b8fa8;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .btn-login {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: #8b85ff;
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .hint {
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="logo">
        <div class="logo-icon">🏪</div>
        <h1>POS Pro</h1>
        <p>Sistema Punto de Venta</p>
    </div>

    <div class="card-login">
        <h2>Iniciar Sesión</h2>

        {% if form.errors %}
        <div class="error-msg">
            <i class="bi bi-exclamation-circle me-2"></i>
            Usuario o contraseña incorrectos.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username"><i class="bi bi-person me-1"></i>Usuario</label>
                <input type="text" name="username" id="id_username" placeholder="admin" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="id_password"><i class="bi bi-lock me-1"></i>Contraseña</label>
                <input type="password" name="password" id="id_password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar al Sistema
            </button>
        </form>
    </div>

    <p class="hint">POS Pro &copy; 2024 — Sistema de contabilidad y ventas</p>
</div>
</body>
</html>
